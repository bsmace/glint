<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Glint Demo</title><style>
  body { font-family: system-ui; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f5f5f5; margin: 0; }
  .chat { width: 680px; background: #fff; border-radius: 16px; box-shadow: 0 2px 16px rgba(0,0,0,0.08); padding: 24px; }
  textarea { width: 100%; min-height: 120px; padding: 14px; border: 1px solid #ddd; border-radius: 12px; font-size: 14px; resize: vertical; box-sizing: border-box; }
  textarea:focus { outline: none; border-color: #888; }
</style></head><body>
<div class="chat">
  <h2 style="margin:0 0 16px;font-weight:600;font-size:16px">Glint Demo</h2>
  <textarea id="input" placeholder="Type a prompt...">Write a blog post about the benefits of renewable energy for a general audience</textarea>
</div>
<script>
  const el = document.getElementById('input');
  setTimeout(() => { el.focus(); }, 500);
</script>
</body></html>
